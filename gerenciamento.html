<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão - Decorações</title>
    <link rel="stylesheet" href="style.css">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#B189D9">
    <!--quebra de cache! -->
    <link rel="manifest" href="manifest.json?v=2">
</head>
<body class="admin-body">

    <header>📅 Gestão de Reservas</header>

    <div class="container">
        
        <div id="tela-login">
            <div class="login-box">
                <h2>Acesso Restrito</h2>
                <input type="password" id="senha-input" placeholder="Digite a senha" onkeypress="if(event.key === 'Enter') verificarSenha()">
                <button onclick="verificarSenha()">Entrar</button>
            </div>
        </div>

        <div id="painel-principal">
            <!--BOTÕES-->
            <div class="view-toggle">
                <button id="btn-view-lista" class="active" onclick="mudarVisao('lista')">📋 Ver Lista</button>
                <button id="btn-view-calendario" onclick="mudarVisao('calendario')">📅 Ver Calendário</button>
            </div>

            <div class="container-filtros">
                <input type="text" id="filtro-nome" placeholder="🔍 Nome, Tema ou Data (ex: 04/06)" onkeyup="filtrarCartoes()">
                <input type="date" id="filtro-data" onchange="filtrarCartoes()">
                <button onclick="sairPainel()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;" title="Sair do Sistema">🚪</button>
            </div>

            <div id="tela-calendario" style="display: none;">
                <div class="calendario-header">
                    <button onclick="mudarMes(-1)">◀</button>
                    <h3 id="mes-ano-display">Carregando...</h3>
                    <button onclick="mudarMes(1)">▶</button>
                </div>
                <div class="calendario-dias-semana">
                    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                </div>
                <div id="calendario-grid" class="calendario-grid">
                    <!--JavaScript-->
                </div>
            </div>

            <div id="painel-container">
                <div class="status-msg" id="loading">Conectando ao banco de dados... ✨</div>
            </div>

        </div>

    </div>

    <div id="area-impressao"></div>
    
    <script src="painel.js"></script>
</body>
</html>
